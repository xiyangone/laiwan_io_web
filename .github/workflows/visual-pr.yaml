name: visual-pr

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    branches:
      - master
    paths:
      - "react_laiwan_com/**"
      - "visual_regression/**"
      - "deploy/docker-compose.visual.yml"
      - "docker/visual.Dockerfile"
      - "docker/visual/**"
      - "package.json"
      - ".github/workflows/visual-pr.yaml"
  workflow_dispatch:

concurrency:
  group: visual-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect visual approval
        id: visual-approval
        if: github.event_name == 'pull_request'
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const labels = JSON.parse(process.env.LABELS_JSON || '[]');
          const approved = labels.includes('visual-approved');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `approved=${approved}\n`);
          console.log(`visual-approved label present: ${approved}`);
          NODE

      - name: Checkout base for visual baselines
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: visual-base

      - name: Build base visual runner
        if: github.event_name == 'pull_request'
        working-directory: visual-base
        run: docker compose -f deploy/docker-compose.visual.yml build visual

      - name: Generate base visual baselines
        if: github.event_name == 'pull_request'
        working-directory: visual-base
        run: docker compose -f deploy/docker-compose.visual.yml run --rm -e CI=1 visual bun run test:visual:update

      - name: Use base visual baselines
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p visual_regression/test
          find visual_regression/test -maxdepth 1 -name 'baseline-*.png' -type f -delete
          mapfile -t baselines < <(find visual-base/visual_regression/test -maxdepth 1 -name 'baseline-*.png' -type f | sort)

          if [ "${#baselines[@]}" -eq 0 ]; then
            echo "No visual baselines were generated from base sha ${{ github.event.pull_request.base.sha }}."
            exit 1
          fi

          cp "${baselines[@]}" visual_regression/test/
          echo "Copied ${#baselines[@]} visual baseline(s) from base sha ${{ github.event.pull_request.base.sha }}."

      - name: Remove base checkout
        if: github.event_name == 'pull_request'
        run: rm -rf visual-base

      - name: Build visual runner
        run: docker compose -f deploy/docker-compose.visual.yml build visual

      - name: Run visual regression
        id: visual
        continue-on-error: true
        run: docker compose -f deploy/docker-compose.visual.yml run --rm -e CI=1 visual bun run test:visual

      - name: Detect missing baselines
        id: missing-baselines
        if: steps.visual.outcome == 'failure'
        env:
          TEST_RESULTS_DIR: test-results
        run: node visual_regression/scripts/detect-missing-baselines.js

      - name: Fail on missing visual baselines
        if: steps.visual.outcome == 'failure' && steps.missing-baselines.outputs.missing == 'true'
        run: |
          echo "Visual baselines are still missing after generating baselines from the base sha."
          echo "This usually means the PR introduced a new visual case that does not exist on the base branch."
          exit 1

      - name: Collect visual review artifacts
        if: steps.visual.outcome == 'failure' && steps.missing-baselines.outputs.missing != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || 'manual' }}
          VISUAL_REVIEW_ARTIFACT_BRANCH: visual-review-artifacts
        run: |
          docker compose -f deploy/docker-compose.visual.yml run --rm \
            -e CI=1 \
            -e TEST_RESULTS_DIR=/workspace/test-results \
            -e VISUAL_REVIEW_DIR=/workspace/visual-review \
            -e GITHUB_REPOSITORY=${{ github.repository }} \
            -e PR_NUMBER="$PR_NUMBER" \
            -e GITHUB_RUN_ID=${{ github.run_id }} \
            -e VISUAL_REVIEW_ARTIFACT_BRANCH="$VISUAL_REVIEW_ARTIFACT_BRANCH" \
            -e VISUAL_REVIEW_REQUIRE_CASES=1 \
            visual node /workspace/visual_regression/scripts/collect-review-artifacts.js

      - name: Collect PR code context
        if: github.event_name == 'pull_request' && steps.visual.outcome == 'failure' && steps.missing-baselines.outputs.missing != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VISUAL_REVIEW_DIR: visual-review
        run: |
          sudo chown -R "$USER":"$USER" visual-review
          node visual_regression/scripts/collect-pr-code-context.js

      - name: Upload visual review
        if: steps.visual.outcome == 'failure' && steps.missing-baselines.outputs.missing != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: visual-review
          path: visual-review/
          if-no-files-found: ignore

      - name: Publish visual review images
        if: github.event_name == 'pull_request' && steps.visual.outcome == 'failure' && steps.missing-baselines.outputs.missing != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VISUAL_REVIEW_ARTIFACT_BRANCH: visual-review-artifacts
        run: node visual_regression/scripts/publish-review-artifacts.js

      - name: Upsert visual review comment
        if: github.event_name == 'pull_request' && steps.visual.outcome == 'failure' && steps.missing-baselines.outputs.missing != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_BODY_PATH: visual-review/summary.md
          VISUAL_REVIEW_APPROVED: ${{ steps.visual-approval.outputs.approved }}
        run: node visual_regression/scripts/upsert-review-comment.js

      - name: Upsert visual pass comment
        if: github.event_name == 'pull_request' && steps.visual.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VISUAL_REVIEW_STATUS: pass
        run: node visual_regression/scripts/upsert-review-comment.js

      - name: Complete visual review
        if: steps.visual.outcome == 'failure' && steps.missing-baselines.outputs.missing != 'true'
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Visual diffs were found."
            exit 1
          fi

          if [ "${{ steps.visual-approval.outputs.approved }}" = "true" ]; then
            echo "Visual diffs were found and approved by the visual-approved label."
          else
            echo "Visual diffs were found. Add the visual-approved label to accept them."
            exit 1
          fi
